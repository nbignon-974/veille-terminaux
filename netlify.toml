[build]
  command   = "cd frontend && npm install && npm run build"
  publish   = "frontend/dist"

[[edge_functions]]
  function         = "auth"
  path             = "/*"
  excluded_patterns = ["/assets/*", "/*.ico", "/*.png", "/*.svg", "/*.webp", "/*.woff2", "/*.woff", "/*.ttf"]

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
